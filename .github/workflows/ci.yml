name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install uv
        run: pip install uv
      - name: Sync deps
        run: uv sync --extra dev
      - name: Ruff
        run: uv run --extra dev ruff check .
      - name: MyPy
        run: uv run --extra dev mypy src
      - name: Tests
        run: uv run --extra dev pytest
